services:
  alloy-remote-config-server:
    build: .
    container_name: alloy-remote-config-server
    ports:
      - "8080:8080"  # HTTP REST API
      - "8888:8888"  # gRPC endpoint for Alloy agents
    environment:
      # Template configuration directory (default: conf)
      - CONFIG_FOLDER=conf
      # HTTP port for REST API (default: 8080)
      - HTTP_PORT=8080
      # gRPC port for Alloy agents (default: 8888)
      - GRPC_PORT=8888
      # Listen address (default: 0.0.0.0)
      - LISTEN_ADDR=0.0.0.0
    volumes:
      # Mount your template directory - REQUIRED
      # This directory should contain .conf.tmpl files
      - ./example/conf:/app/conf:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
  alloy:
    image: grafana/alloy:latest
    command: ["run", "--server.http.listen-addr=0.0.0.0:12345", "--storage.path=/var/lib/alloy/data", "/etc/alloy/config.alloy"]
    ports:
      - "12345:12345"
    volumes:
      - ./example/config.alloy:/etc/alloy/config.alloy
    depends_on:
      - alloy-remote-config-server
